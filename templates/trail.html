{% extends "base.html" %}
{% block content %}
<h2>{{ trail.properties.name }}</h2>
<p>ID: {{ trail.properties.id }}</p>
<div id="map"></div>
<script>
    const map = L.map("map").setView([40.2, -82.9], 10);
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map);
    L.geoJSON({{ trail|tojson }}).addTo(map);
</script>
{% endblock %}
